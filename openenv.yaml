spec_version: 1
name: eco_llm_inference_routing
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: "Carbon-aware RL environment for multi-objective LLM query routing"
version: "1.0.0"

tasks:
  - id: "task_1"
    grader: "rubrics:Task1Rubric"
    name: "Single Query Routing"
    description: "Route a single LLM query to the optimal model tier while minimising carbon footprint and latency. The agent must choose a model that meets the query minimum capability requirement."
    difficulty: "easy"

  - id: "task_2"
    grader: "rubrics:Task2Rubric"
    name: "Multi-Query Episode"
    description: "Route three queries of varying complexity. An extra penalty applies when the LARGE model is used unnecessarily. The agent must balance accuracy against energy cost over the 3-query episode."
    difficulty: "medium"

  - id: "task_3"
    grader: "rubrics:Task3Rubric"
    name: "Stateful Carbon-Aware Routing"
    description: "Route five queries including repeated queries, a KB-answerable question, and a compliance query requiring LARGE. The agent must exploit caching, cascade strategies, KB lookups, and WAIT actions to maximise cumulative reward."
    difficulty: "hard"
