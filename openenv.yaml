spec_version: 1
name: eco_llm_inference_routing
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: "Carbon-aware RL environment for multi-objective LLM query routing"
version: "1.0.0"

api:
  base_url: /
  endpoints:
    reset:
      method: POST
      path: /reset
    step:
      method: POST
      path: /step
    state:
      method: GET
      path: /state
    tasks:
      method: GET
      path: /tasks
    grader:
      method: POST
      path: /grader

tasks:
  - id: task_1
    task_id: task_1
    name: Single Query Routing
    difficulty: easy
    description: "Route a single LLM query to the optimal model tier while minimising carbon footprint and latency."
    max_steps: 10
    grader: graders:grade_task_1
    graders:
      - graders:grade_task_1
    reward_range:
      - 0.0
      - 1.0

  - id: task_2
    task_id: task_2
    name: Multi-Query Episode
    difficulty: medium
    description: "Route 3 queries of varying complexity. LARGE model incurs -0.2 penalty per use."
    max_steps: 20
    grader: graders:grade_task_2
    graders:
      - graders:grade_task_2
    reward_range:
      - 0.0
      - 1.0

  - id: task_3
    task_id: task_3
    name: Stateful Carbon-Aware Routing
    difficulty: hard
    description: "5-query stateful episode with caching, KB lookups, cascade strategies, and carbon-aware waiting."
    max_steps: 50
    grader: graders:grade_task_3
    graders:
      - graders:grade_task_3
    reward_range:
      - 0.0
      - 1.0
